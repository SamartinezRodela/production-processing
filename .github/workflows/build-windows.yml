name: Build Windows Installer

# Modo solo-EXE: Python embebido se usa solo para compilar, no se empaqueta
on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python (temporal para compilar EXEs)
        run: |
          # Descargar Python embebido (solo para compilar, se borra después)
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.13.0/python-3.13.0-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "python-build-temp" -Force

          cd python-build-temp

          # Configurar pip
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          $pthFile = "python313._pth"
          if (Test-Path $pthFile) {
            $content = Get-Content $pthFile
            $content = $content -replace "#import site", "import site"
            $content | Set-Content $pthFile
          }
          .\python.exe get-pip.py --no-warn-script-location

          # Instalar PyInstaller + todas las bibliotecas necesarias para compilar
          Write-Host "Instalando PyInstaller y bibliotecas..." -ForegroundColor Cyan
          .\python.exe -m pip install pyinstaller --no-warn-script-location
          .\python.exe -m pip install reportlab pypdf Pillow openpyxl requests --no-warn-script-location
          .\python.exe -m pip install numpy pandas scipy matplotlib --no-warn-script-location
          .\python.exe -m pip install opencv-python-headless pymupdf tifffile --no-warn-script-location

          Write-Host "[OK] Entorno de compilación listo" -ForegroundColor Green
          cd ..
        shell: pwsh

      - name: Compile Python Scripts to EXE
        run: |
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host "COMPILANDO TODOS LOS SCRIPTS A .EXE (PyInstaller)" -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan

          $pythonExe = "python-build-temp\python.exe"
          $outputDir = "nest-files-py-embedded\executables"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          # ── Grupo A: Scripts stdlib (EXE ligeros ~5-10MB) ──
          Write-Host ""
          Write-Host "--- Grupo A: Scripts stdlib ---" -ForegroundColor Yellow

          $grupoA = @("saludar.py", "guardar_pdf_path.py", "procesar_pdf.py")

          foreach ($script in $grupoA) {
            $scriptPath = "nest-files-py\$script"
            if (Test-Path $scriptPath) {
              Write-Host "Compilando $script ..." -ForegroundColor Yellow
              & $pythonExe -m PyInstaller --onefile --clean --noconfirm `
                --distpath $outputDir --workpath "build_temp" --specpath "build_temp" `
                $scriptPath

              $exeName = $script -replace '\.py$', '.exe'
              if (Test-Path "$outputDir\$exeName") {
                $sizeMB = [math]::Round((Get-Item "$outputDir\$exeName").Length / 1MB, 2)
                Write-Host "   [OK] $exeName ($sizeMB MB)" -ForegroundColor Green
              } else {
                Write-Host "   [WARN] $exeName no se generó" -ForegroundColor Red
              }
            } else {
              Write-Host "   [SKIP] $script no encontrado" -ForegroundColor Yellow
            }
          }

          Remove-Item -Recurse -Force "build_temp" -ErrorAction SilentlyContinue

          # ── Grupo B: Dispatcher (EXE con todas las bibliotecas ~200MB) ──
          Write-Host ""
          Write-Host "--- Grupo B: Dispatcher (todas las bibliotecas) ---" -ForegroundColor Yellow

          $dispatcherPath = "nest-files-py\dispatcher.py"
          if (Test-Path $dispatcherPath) {
            Write-Host "Compilando dispatcher.py (esto puede tardar varios minutos)..." -ForegroundColor Yellow
            & $pythonExe -m PyInstaller --onefile --clean --noconfirm `
              --distpath $outputDir --workpath "build_temp" --specpath "build_temp" `
              --hidden-import "reportlab" --hidden-import "reportlab.pdfgen" `
              --hidden-import "reportlab.lib.pagesizes" --hidden-import "reportlab.lib.units" `
              --hidden-import "pypdf" --hidden-import "fitz" `
              --hidden-import "PIL" --hidden-import "cv2" `
              --hidden-import "numpy" --hidden-import "pandas" `
              --hidden-import "scipy" --hidden-import "scipy.stats" `
              --hidden-import "matplotlib" --hidden-import "matplotlib.pyplot" `
              --hidden-import "openpyxl" --hidden-import "tifffile" `
              --hidden-import "requests" `
              $dispatcherPath

            if (Test-Path "$outputDir\dispatcher.exe") {
              $sizeMB = [math]::Round((Get-Item "$outputDir\dispatcher.exe").Length / 1MB, 2)
              Write-Host "   [OK] dispatcher.exe ($sizeMB MB)" -ForegroundColor Green
            } else {
              Write-Host "   [ERROR] dispatcher.exe no se generó" -ForegroundColor Red
              exit 1
            }
          } else {
            Write-Host "   [ERROR] dispatcher.py no encontrado en nest-files-py\" -ForegroundColor Red
            exit 1
          }

          # Limpiar temporales de PyInstaller
          Remove-Item -Recurse -Force "build_temp" -ErrorAction SilentlyContinue

          # ── Resumen ──
          Write-Host ""
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host "EXEs generados:" -ForegroundColor Cyan
          Get-ChildItem -Path "$outputDir\*.exe" | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "   [OK] $($_.Name) ($sizeMB MB)" -ForegroundColor White
          }
          Write-Host "============================================================" -ForegroundColor Cyan
        shell: pwsh

      - name: Cleanup Python Build Environment
        run: |
          Write-Host "Limpiando entorno de compilación Python..." -ForegroundColor Cyan

          # Terminar procesos Python
          Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Process pip* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          # Liberar handles
          for ($i = 1; $i -le 3; $i++) {
            [System.GC]::Collect()
            [System.GC]::WaitForPendingFinalizers()
            Start-Sleep -Seconds 2
          }

          # Borrar Python temporal (ya no se necesita, todo está en los .exe)
          Remove-Item -Recurse -Force "python-build-temp" -ErrorAction SilentlyContinue
          Remove-Item -Force "python-embed.zip" -ErrorAction SilentlyContinue

          # Verificar que solo quedan los .exe
          $exeCount = (Get-ChildItem -Path "nest-files-py-embedded\executables\*.exe").Count
          Write-Host "[OK] Entorno limpio. Solo $exeCount archivos .exe en el paquete final." -ForegroundColor Green
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (backend)
        working-directory: nest-ui-be
        run: npm install

      - name: Install dependencies (frontend)
        working-directory: nest-ui-fe
        run: npm install

      - name: Install dependencies (electron)
        working-directory: nest-electron
        run: npm install

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Prepare for Electron Build
        run: |
          Write-Host "Preparando para build de Electron..." -ForegroundColor Cyan

          # Verificar que los EXEs existen
          $exeDir = "nest-files-py-embedded\executables"
          if (Test-Path $exeDir) {
            $exeCount = (Get-ChildItem -Path "$exeDir\*.exe").Count
            Write-Host "[OK] $exeCount ejecutables listos para empaquetar" -ForegroundColor Green
            Get-ChildItem -Path "$exeDir\*.exe" | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "   $($_.Name) ($sizeMB MB)" -ForegroundColor White
            }
          } else {
            Write-Host "[ERROR] Directorio de ejecutables no encontrado" -ForegroundColor Red
            exit 1
          }

          Write-Host "[OK] Preparación completada" -ForegroundColor Green
        shell: pwsh

      - name: Build Electron App (Windows)
        working-directory: nest-electron
        run: |
          Write-Host "Iniciando Electron Builder..." -ForegroundColor Cyan

          $maxRetries = 3
          $retryCount = 0
          $success = $false

          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              if ($retryCount -gt 0) {
                Write-Host "Reintento $retryCount de $maxRetries..." -ForegroundColor Yellow
                Start-Sleep -Seconds 10
              }

              npm run dist:win
              $success = $true
              Write-Host "[OK] Build completado exitosamente" -ForegroundColor Green

            } catch {
              $retryCount++
              Write-Host "[ERROR] Build falló: $_" -ForegroundColor Red

              if ($retryCount -ge $maxRetries) {
                Write-Host "[FATAL] Máximo de reintentos alcanzado" -ForegroundColor Red
                throw
              }
            }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"
        shell: pwsh

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
          retention-days: 30

      - name: Upload Portable Version
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: nest-electron/release/win-unpacked/
          retention-days: 30

      - name: Create Compressed Portable (7z - Maximum Compression)
        run: |
          cd nest-electron/release

          Write-Host "Creando version portable comprimida con 7-Zip..."

          Remove-Item -Recurse -Force "win-unpacked\resources\*.md" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\LICENSE*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\CHANGELOG*" -ErrorAction SilentlyContinue

          7z a -t7z -mx=7 -mfb=64 -md=16m -ms=on "Production-Processing-Portable.7z" "win-unpacked\"

          if (Test-Path "Production-Processing-Portable.7z") {
            $size = (Get-Item "Production-Processing-Portable.7z").Length / 1MB
            Write-Host "[OK] Compresion completada - Tamaño: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "[ERROR] No se pudo crear el archivo 7z"
            exit 1
          }
        shell: pwsh

      - name: Upload Portable Compressed (7z)
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-compressed
          path: nest-electron/release/Production-Processing-Portable.7z
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
