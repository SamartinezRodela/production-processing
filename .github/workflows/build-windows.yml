name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python Embedded
        run: |
          # Descargar Python embebido
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.13.0/python-3.13.0-embed-amd64.zip" -OutFile "python-embed.zip"

          # Extraer
          Expand-Archive -Path "python-embed.zip" -DestinationPath "nest-files-py-embedded" -Force

          # Configurar Python embebido para usar pip
          cd nest-files-py-embedded

          # Descargar get-pip.py
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"

          # Habilitar site-packages editando python313._pth
          $pthFile = "python313._pth"
          if (Test-Path $pthFile) {
            $content = Get-Content $pthFile
            $content = $content -replace "#import site", "import site"
            $content | Set-Content $pthFile
          }

          # Instalar pip
          .\python.exe get-pip.py --no-warn-script-location

          # Instalar reportlab
          .\python.exe -m pip install reportlab --no-warn-script-location

          cd ..

          # Copiar scripts Python personalizados
          Write-Host "Copiando scripts Python personalizados..."
          if (Test-Path "nest-files-py") {
            Copy-Item -Path "nest-files-py\*.py" -Destination "nest-files-py-embedded\" -Force
            Write-Host "Scripts copiados exitosamente"
          } else {
            Write-Host "Advertencia: carpeta nest-files-py no encontrada"
          }

          # Crear carpeta executables
          New-Item -ItemType Directory -Path "nest-files-py-embedded\executables" -Force | Out-Null
          Write-Host "Carpeta executables creada"
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (backend)
        working-directory: nest-ui-be
        run: npm install

      - name: Install dependencies (frontend)
        working-directory: nest-ui-fe
        run: npm install

      - name: Install dependencies (electron)
        working-directory: nest-electron
        run: npm install

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Build Electron App (Windows)
        working-directory: nest-electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
          retention-days: 30

      - name: Upload Portable Version
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: nest-electron/release/win-unpacked/
          retention-days: 30

      - name: Create Compressed Portable (7z - Maximum Compression)
        run: |
          cd nest-electron/release

          Write-Host "🗜️ Creando versión portable comprimida con 7-Zip..."

          # Limpiar archivos innecesarios antes de comprimir
          Write-Host "🧹 Limpiando archivos innecesarios..."
          Remove-Item -Recurse -Force "win-unpacked\resources\*.md" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\LICENSE*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\CHANGELOG*" -ErrorAction SilentlyContinue

          # Comprimir con 7-Zip (compresión balanceada - rápida descompresión)
          Write-Host "📦 Comprimiendo con 7-Zip (nivel balanceado)..."
          7z a -t7z -mx=7 -mfb=64 -md=16m -ms=on "Production-Processing-Portable.7z" "win-unpacked\"

          # Mostrar información del archivo
          if (Test-Path "Production-Processing-Portable.7z") {
            $size = (Get-Item "Production-Processing-Portable.7z").Length / 1MB
            Write-Host "✅ Compresión completada"
            Write-Host "📊 Tamaño final: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "❌ Error: No se pudo crear el archivo 7z"
            exit 1
          }
        shell: pwsh

      - name: Upload Portable Compressed (7z)
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-compressed
          path: nest-electron/release/Production-Processing-Portable.7z
          retention-days: 30

      # Si es un tag (release), crear GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
