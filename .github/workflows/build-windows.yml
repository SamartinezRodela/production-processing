name: Build Windows Installer

# Última actualización: Compresión 7z balanceada
on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python Embedded
        run: |
          # Descargar Python embebido
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.13.0/python-3.13.0-embed-amd64.zip" -OutFile "python-embed.zip"

          # Extraer
          Expand-Archive -Path "python-embed.zip" -DestinationPath "nest-files-py-embedded" -Force

          # Configurar Python embebido para usar pip
          cd nest-files-py-embedded

          # Descargar get-pip.py
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"

          # Habilitar site-packages editando python313._pth
          $pthFile = "python313._pth"
          if (Test-Path $pthFile) {
            $content = Get-Content $pthFile
            $content = $content -replace "#import site", "import site"
            $content | Set-Content $pthFile
          }

          # Instalar pip
          .\python.exe get-pip.py --no-warn-script-location

          # Instalar reportlab
          .\python.exe -m pip install reportlab --no-warn-script-location

          cd ..

          # Copiar scripts Python personalizados
          Write-Host "Copiando scripts Python personalizados..."
          if (Test-Path "nest-files-py") {
            Copy-Item -Path "nest-files-py\*.py" -Destination "nest-files-py-embedded\" -Force
            Write-Host "Scripts copiados exitosamente"
          } else {
            Write-Host "Advertencia: carpeta nest-files-py no encontrada"
          }

          # Crear carpeta executables
          New-Item -ItemType Directory -Path "nest-files-py-embedded\executables" -Force | Out-Null
          Write-Host "Carpeta executables creada"
        shell: pwsh

      - name: Compile Python Scripts to Bytecode
        run: |
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host "COMPILANDO SCRIPTS PYTHON A BYTECODE (.pyc)" -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host ""

          # Verificar que el script de compilación existe
          if (-not (Test-Path "compile-python-scripts.py")) {
            Write-Host "[ERROR] compile-python-scripts.py no encontrado" -ForegroundColor Red
            exit 1
          }

          # Ejecutar compilación
          $process = Start-Process -FilePath "python" -ArgumentList "compile-python-scripts.py" -NoNewWindow -Wait -PassThru

          if ($process.ExitCode -ne 0) {
            Write-Host "[ERROR] Error compilando scripts Python" -ForegroundColor Red
            exit 1
          }

          # Esperar a que Python libere todos los archivos
          Start-Sleep -Seconds 2

          Write-Host ""
          Write-Host "[OK] Scripts Python compilados a .pyc" -ForegroundColor Green
          Write-Host ""

          # Verificar que los archivos .pyc fueron creados
          $pycFiles = Get-ChildItem -Path "nest-files-py-embedded" -Filter "*.pyc"
          Write-Host "Archivos .pyc generados:" -ForegroundColor Cyan
          foreach ($file in $pycFiles) {
            Write-Host "   [OK] $($file.Name)" -ForegroundColor White
          }
          Write-Host ""

          # Mostrar hashes generados
          if (Test-Path "python-hashes.json") {
            Write-Host "Hashes SHA-256 generados:" -ForegroundColor Cyan
            Get-Content "python-hashes.json" | Write-Host
            Write-Host ""
          }

          Write-Host "[SECURITY] Verificacion de integridad activa" -ForegroundColor Green
          Write-Host ""
        shell: pwsh

      - name: Release Python Embedded Files
        run: |
          Write-Host "Liberando archivos Python embebidos..." -ForegroundColor Cyan

          # Esperar un momento para que Windows libere los archivos
          Start-Sleep -Seconds 2

          # Forzar garbage collection
          [System.GC]::Collect()
          [System.GC]::WaitForPendingFinalizers()

          Write-Host "[OK] Archivos liberados" -ForegroundColor Green
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (backend)
        working-directory: nest-ui-be
        run: npm install

      - name: Install dependencies (frontend)
        working-directory: nest-ui-fe
        run: npm install

      - name: Install dependencies (electron)
        working-directory: nest-electron
        run: npm install

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Prepare for Electron Build
        run: |
          Write-Host "Preparando para build de Electron..." -ForegroundColor Cyan

          # Liberar cualquier handle de archivo
          [System.GC]::Collect()
          [System.GC]::WaitForPendingFinalizers()
          [System.GC]::Collect()

          # Esperar para asegurar que Windows libere los archivos
          Start-Sleep -Seconds 3

          # Verificar que los archivos Python existen y son accesibles
          $pythonDir = "nest-files-py-embedded"
          if (Test-Path $pythonDir) {
            $fileCount = (Get-ChildItem -Path $pythonDir -Recurse -File).Count
            Write-Host "[OK] Python embebido listo: $fileCount archivos" -ForegroundColor Green
          } else {
            Write-Host "[ERROR] Directorio Python no encontrado" -ForegroundColor Red
            exit 1
          }
        shell: pwsh

      - name: Build Electron App (Windows)
        working-directory: nest-electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
          retention-days: 30

      - name: Upload Portable Version
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: nest-electron/release/win-unpacked/
          retention-days: 30

      - name: Create Compressed Portable (7z - Maximum Compression)
        run: |
          cd nest-electron/release

          Write-Host "Creando version portable comprimida con 7-Zip..."

          # Limpiar archivos innecesarios antes de comprimir
          Write-Host "Limpiando archivos innecesarios..."
          Remove-Item -Recurse -Force "win-unpacked\resources\*.md" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\LICENSE*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\CHANGELOG*" -ErrorAction SilentlyContinue

          # Comprimir con 7-Zip (compresión balanceada - rápida descompresión)
          Write-Host "Comprimiendo con 7-Zip (nivel balanceado)..."
          7z a -t7z -mx=7 -mfb=64 -md=16m -ms=on "Production-Processing-Portable.7z" "win-unpacked\"

          # Mostrar información del archivo
          if (Test-Path "Production-Processing-Portable.7z") {
            $size = (Get-Item "Production-Processing-Portable.7z").Length / 1MB
            Write-Host "[OK] Compresion completada"
            Write-Host "Tamaño final: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "[ERROR] No se pudo crear el archivo 7z"
            exit 1
          }
        shell: pwsh

      - name: Upload Portable Compressed (7z)
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-compressed
          path: nest-electron/release/Production-Processing-Portable.7z
          retention-days: 30

      # Si es un tag (release), crear GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
