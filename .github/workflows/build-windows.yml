name: Build Windows Installer

# Modo solo nest_only_pdf.exe descargado desde release
on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── COMENTADO: Ya no se compilan .exe con PyInstaller ──
      # Solo se usa nest_only_pdf.exe descargado desde release
      #
      # - name: Setup Python (temporal para compilar EXEs)
      # - name: Compile Python Scripts to EXE
      # - name: Cleanup Python Build Environment

      - name: Download External EXEs from Release
        run: |
          Write-Host "Descargando nest_only_pdf.exe desde release..." -ForegroundColor Cyan
          $outputDir = "nest-files-py-embedded\executables"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $releaseTag = "v1.0.0-exes"
          $assetName = "nest_only_pdf.exe"
          $repoOwner = "${{ github.repository_owner }}"
          $repoName = "${{ github.event.repository.name }}"

          $releaseUrl = "https://api.github.com/repos/${repoOwner}/${repoName}/releases/tags/${releaseTag}"
          $headers = @{ "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"; "Accept" = "application/vnd.github.v3+json" }

          $release = Invoke-RestMethod -Uri $releaseUrl -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -eq $assetName }

          if ($asset) {
            $downloadUrl = $asset.browser_download_url
            Write-Host "Descargando desde: $downloadUrl" -ForegroundColor Yellow
            Invoke-WebRequest -Uri $downloadUrl -OutFile "$outputDir\$assetName" -Headers @{ "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}" }

            $sizeMB = [math]::Round((Get-Item "$outputDir\$assetName").Length / 1MB, 2)
            Write-Host "[OK] $assetName descargado ($sizeMB MB)" -ForegroundColor Green
          } else {
            Write-Host "[ERROR] $assetName no encontrado en release $releaseTag" -ForegroundColor Red
            exit 1
          }

          # Resumen
          Write-Host ""
          Write-Host "EXEs listos:" -ForegroundColor Cyan
          Get-ChildItem -Path "$outputDir\*.exe" | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "   [OK] $($_.Name) ($sizeMB MB)" -ForegroundColor White
          }
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (backend)
        working-directory: nest-ui-be
        run: npm install

      - name: Install dependencies (frontend)
        working-directory: nest-ui-fe
        run: npm install

      - name: Install dependencies (electron)
        working-directory: nest-electron
        run: npm install

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Prepare for Electron Build
        run: |
          Write-Host "Preparando para build de Electron..." -ForegroundColor Cyan

          $exeDir = "nest-files-py-embedded\executables"
          if (Test-Path $exeDir) {
            $exeCount = (Get-ChildItem -Path "$exeDir\*.exe").Count
            Write-Host "[OK] $exeCount ejecutables listos para empaquetar" -ForegroundColor Green
            Get-ChildItem -Path "$exeDir\*.exe" | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "   $($_.Name) ($sizeMB MB)" -ForegroundColor White
            }
          } else {
            Write-Host "[ERROR] Directorio de ejecutables no encontrado" -ForegroundColor Red
            exit 1
          }

          Write-Host "[OK] Preparación completada" -ForegroundColor Green
        shell: pwsh

      - name: Build Electron App (Windows)
        working-directory: nest-electron
        run: |
          Write-Host "Iniciando Electron Builder..." -ForegroundColor Cyan

          $maxRetries = 3
          $retryCount = 0
          $success = $false

          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              if ($retryCount -gt 0) {
                Write-Host "Reintento $retryCount de $maxRetries..." -ForegroundColor Yellow
                Start-Sleep -Seconds 10
              }

              npm run dist:win
              $success = $true
              Write-Host "[OK] Build completado exitosamente" -ForegroundColor Green

            } catch {
              $retryCount++
              Write-Host "[ERROR] Build falló: $_" -ForegroundColor Red

              if ($retryCount -ge $maxRetries) {
                Write-Host "[FATAL] Máximo de reintentos alcanzado" -ForegroundColor Red
                throw
              }
            }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"
        shell: pwsh

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
          retention-days: 30

      - name: Upload Portable Version
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: nest-electron/release/win-unpacked/
          retention-days: 30

      - name: Create Compressed Portable (7z - Maximum Compression)
        run: |
          cd nest-electron/release

          Write-Host "Creando version portable comprimida con 7-Zip..."

          Remove-Item -Recurse -Force "win-unpacked\resources\*.md" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\LICENSE*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\CHANGELOG*" -ErrorAction SilentlyContinue

          7z a -t7z -mx=7 -mfb=64 -md=16m -ms=on "Production-Processing-Portable.7z" "win-unpacked\"

          if (Test-Path "Production-Processing-Portable.7z") {
            $size = (Get-Item "Production-Processing-Portable.7z").Length / 1MB
            Write-Host "[OK] Compresion completada - Tamaño: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "[ERROR] No se pudo crear el archivo 7z"
            exit 1
          }
        shell: pwsh

      - name: Upload Portable Compressed (7z)
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-compressed
          path: nest-electron/release/Production-Processing-Portable.7z
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
