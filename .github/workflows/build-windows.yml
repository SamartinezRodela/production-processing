name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python Embedded
        run: |
          # Descargar Python embebido
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.13.0/python-3.13.0-embed-amd64.zip" -OutFile "python-embed.zip"

          # Extraer
          Expand-Archive -Path "python-embed.zip" -DestinationPath "nest-files-py-embedded" -Force

          # Instalar pip
          cd nest-files-py-embedded
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          .\python.exe get-pip.py

          # Instalar dependencias
          .\python.exe -m pip install reportlab

          cd ..
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (backend)
        working-directory: nest-ui-be
        run: npm install

      - name: Install dependencies (frontend)
        working-directory: nest-ui-fe
        run: npm install

      - name: Install dependencies (electron)
        working-directory: nest-electron
        run: npm install

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Build Electron App (Windows)
        working-directory: nest-electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
          retention-days: 30

      - name: Upload Portable Version
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: nest-electron/release/win-unpacked/
          retention-days: 30

      # Si es un tag (release), crear GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nest-electron/release/*.exe
            nest-electron/release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
