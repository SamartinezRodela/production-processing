name: Build All Platforms

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install reportlab PyPDF2

      - name: Install and Build Frontend
        working-directory: nest-ui-fe
        run: |
          npm ci
          npm run build

      - name: Install and Build Backend
        working-directory: nest-ui-be
        run: |
          npm ci
          npm run build

      - name: Install and Build Electron
        working-directory: nest-electron
        run: |
          npm ci
          npm run build

      - name: Create Windows Installer
        working-directory: nest-electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v3
        with:
          name: Production-Processing-Windows-Installer
          path: nest-electron/release/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install reportlab PyPDF2

      - name: Install and Build Frontend
        working-directory: nest-ui-fe
        run: |
          npm ci
          npm run build

      - name: Install and Build Backend
        working-directory: nest-ui-be
        run: |
          npm ci
          npm run build

      - name: Install and Build Electron
        working-directory: nest-electron
        run: |
          npm ci
          npm run build

      - name: Create Mac Installer
        working-directory: nest-electron
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v3
        with:
          name: Production-Processing-Mac-Installer
          path: nest-electron/release/*.dmg
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install reportlab PyPDF2

      - name: Install and Build Frontend
        working-directory: nest-ui-fe
        run: |
          npm ci
          npm run build

      - name: Install and Build Backend
        working-directory: nest-ui-be
        run: |
          npm ci
          npm run build

      - name: Install and Build Electron
        working-directory: nest-electron
        run: |
          npm ci
          npm run build

      - name: Create Linux Installer
        working-directory: nest-electron
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v3
        with:
          name: Production-Processing-Linux-Installer
          path: nest-electron/release/*.AppImage
          retention-days: 30

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Production-Processing-Windows-Installer/*
            Production-Processing-Mac-Installer/*
            Production-Processing-Linux-Installer/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
