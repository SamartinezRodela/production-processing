name: Build All Platforms

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install
          cd nest-ui-be && npm install
          cd ../nest-ui-fe && npm install
          cd ../nest-electron && npm install

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Build Electron (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: nest-electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Mac)
        if: matrix.os == 'macos-latest'
        working-directory: nest-electron
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: nest-electron
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: nest-electron/release/*.exe

      - name: Upload Artifacts (Mac)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: nest-electron/release/*.dmg

      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: nest-electron/release/*.AppImage

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: nest-electron/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
