name: Build All Platforms

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ==========================================
      # PYTHON EMBEBIDO - WINDOWS
      # ==========================================
      - name: Setup Python Embedded (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Descargar Python embebido
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.13.0/python-3.13.0-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "nest-files-py-embedded" -Force

          cd nest-files-py-embedded

          # Descargar get-pip.py
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"

          # Habilitar site-packages
          $pthFile = "python313._pth"
          if (Test-Path $pthFile) {
            $content = Get-Content $pthFile
            $content = $content -replace "#import site", "import site"
            $content | Set-Content $pthFile
          }

          # Instalar pip
          .\python.exe get-pip.py --no-warn-script-location

          # Bibliotecas básicas
          .\python.exe -m pip install reportlab --no-warn-script-location
          .\python.exe -m pip install pypdf --no-warn-script-location
          .\python.exe -m pip install Pillow --no-warn-script-location
          .\python.exe -m pip install openpyxl --no-warn-script-location
          .\python.exe -m pip install requests --no-warn-script-location

          # Bibliotecas científicas y procesamiento
          .\python.exe -m pip install numpy --no-warn-script-location
          .\python.exe -m pip install pandas --no-warn-script-location
          .\python.exe -m pip install scipy --no-warn-script-location
          .\python.exe -m pip install matplotlib --no-warn-script-location

          # Procesamiento de imágenes y PDFs
          .\python.exe -m pip install opencv-python-headless --no-warn-script-location
          .\python.exe -m pip install pymupdf --no-warn-script-location
          .\python.exe -m pip install tifffile --no-warn-script-location

          Write-Host "[OK] Todas las bibliotecas instaladas" -ForegroundColor Green

          cd ..

          # Copiar scripts Python personalizados
          if (Test-Path "nest-files-py") {
            $scriptFiles = Get-ChildItem -Path "nest-files-py\*.py"
            Write-Host "Archivos encontrados: $($scriptFiles.Count)" -ForegroundColor Yellow
            foreach ($file in $scriptFiles) {
              Copy-Item -Path $file.FullName -Destination "nest-files-py-embedded\" -Force
              Write-Host "   [OK] Copiado: $($file.Name)" -ForegroundColor White
            }
          }

          # Crear carpeta executables
          New-Item -ItemType Directory -Path "nest-files-py-embedded\executables" -Force | Out-Null
        shell: pwsh

      - name: Compile Python Scripts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Write-Host "[SECURITY] Compilando scripts Python a .pyc (Windows)..." -ForegroundColor Cyan

          # Usar el Python embebido para compilar (misma versión que se empaqueta)
          $pythonExe = "nest-files-py-embedded\python.exe"
          $pythonExe = Resolve-Path $pythonExe

          & $pythonExe --version
          & $pythonExe compile-python-scripts.py

          if ($LASTEXITCODE -ne 0) {
            Write-Host "[ERROR] Error compilando scripts" -ForegroundColor Red
            exit 1
          }

          # Esperar a que Python libere archivos
          Start-Sleep -Seconds 5

          Write-Host "[OK] Scripts compilados" -ForegroundColor Green
        shell: pwsh

      - name: Release Python Embedded Files (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Write-Host "Liberando archivos Python embebidos..." -ForegroundColor Cyan

          Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Process pip* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          for ($i = 1; $i -le 3; $i++) {
            [System.GC]::Collect()
            [System.GC]::WaitForPendingFinalizers()
            [System.GC]::Collect()
            Start-Sleep -Seconds 3
          }

          Start-Sleep -Seconds 10
          Write-Host "[OK] Archivos liberados" -ForegroundColor Green
        shell: pwsh

      # ==========================================
      # PYTHON EMBEBIDO - MAC
      # ==========================================
      - name: Setup Python Embedded (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p nest-files-py-embedded-mac
          cd nest-files-py-embedded-mac

          # Descargar Python standalone
          PYTHON_VERSION="3.11.9"
          PYTHON_BUILD="20240713"
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/${PYTHON_BUILD}/cpython-${PYTHON_VERSION}+${PYTHON_BUILD}-aarch64-apple-darwin-install_only.tar.gz"

          curl -L -o python.tar.gz "$PYTHON_URL"
          tar -xzf python.tar.gz
          rm python.tar.gz
          mv python python-runtime

          # Bibliotecas básicas
          python-runtime/bin/pip3 install reportlab pypdf Pillow openpyxl requests

          # Bibliotecas científicas y procesamiento
          python-runtime/bin/pip3 install numpy pandas scipy matplotlib

          # Procesamiento de imágenes y PDFs
          python-runtime/bin/pip3 install opencv-python-headless pymupdf tifffile

          echo "[OK] Todas las bibliotecas instaladas"

          # Copiar scripts Python
          if [ -d "../nest-files-py" ]; then
            cp ../nest-files-py/*.py . 2>/dev/null || true
            echo "[OK] Scripts Python copiados"
          fi

          # Crear carpeta executables
          mkdir -p executables

          cd ..

      - name: Compile Python Scripts (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          echo "[SECURITY] Compilando scripts Python a .pyc (Mac)..."

          # Usar el Python embebido para compilar (misma versión que se empaqueta)
          PYTHON_EXE="nest-files-py-embedded-mac/python-runtime/bin/python3"

          $PYTHON_EXE --version
          $PYTHON_EXE compile-python-scripts.py nest-files-py-embedded-mac

          if [ $? -ne 0 ]; then
            echo "[ERROR] Error compilando scripts"
            exit 1
          fi
          echo "[OK] Scripts compilados"

      # ==========================================
      # INSTALAR DEPENDENCIAS
      # ==========================================
      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (backend)
        working-directory: nest-ui-be
        run: npm install

      - name: Install dependencies (frontend)
        working-directory: nest-ui-fe
        run: npm install

      - name: Install dependencies (electron)
        working-directory: nest-electron
        run: npm install

      # ==========================================
      # BUILD
      # ==========================================
      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Prepare for Electron Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Write-Host "Preparando para build de Electron..." -ForegroundColor Cyan

          Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3

          for ($i = 1; $i -le 5; $i++) {
            [System.GC]::Collect()
            [System.GC]::WaitForPendingFinalizers()
            Start-Sleep -Seconds 2
          }

          Start-Sleep -Seconds 15

          $pythonDir = "nest-files-py-embedded"
          if (Test-Path $pythonDir) {
            $fileCount = (Get-ChildItem -Path $pythonDir -Recurse -File).Count
            Write-Host "[OK] Python embebido listo: $fileCount archivos" -ForegroundColor Green
          } else {
            Write-Host "[ERROR] Directorio Python no encontrado" -ForegroundColor Red
            exit 1
          }

          Start-Sleep -Seconds 10
          Write-Host "[OK] Preparación completada" -ForegroundColor Green
        shell: pwsh

      # ==========================================
      # ELECTRON BUILD POR PLATAFORMA
      # ==========================================
      - name: Build Electron (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: nest-electron
        run: |
          Write-Host "Iniciando Electron Builder..." -ForegroundColor Cyan

          $maxRetries = 3
          $retryCount = 0
          $success = $false

          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              if ($retryCount -gt 0) {
                Write-Host "Reintento $retryCount de $maxRetries..." -ForegroundColor Yellow
                Start-Sleep -Seconds 10
                Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
                [System.GC]::Collect()
                [System.GC]::WaitForPendingFinalizers()
                Start-Sleep -Seconds 5
              }
              
              npm run dist:win
              $success = $true
              Write-Host "[OK] Build completado exitosamente" -ForegroundColor Green
            } catch {
              $retryCount++
              Write-Host "[ERROR] Build falló: $_" -ForegroundColor Red
              if ($retryCount -ge $maxRetries) {
                Write-Host "[FATAL] Máximo de reintentos alcanzado" -ForegroundColor Red
                throw
              }
            }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"
        shell: pwsh

      - name: Build Electron (Mac)
        if: matrix.os == 'macos-latest'
        working-directory: nest-electron
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"

      - name: Build Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: nest-electron
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"

      # ==========================================
      # ARTIFACTS - WINDOWS
      # ==========================================
      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: nest-electron/release/*.exe

      - name: Create Compressed Portable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd nest-electron/release

          Write-Host "Creando versión portable comprimida..."

          # Limpiar archivos innecesarios
          Remove-Item -Recurse -Force "win-unpacked\resources\*.md" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "win-unpacked\resources\LICENSE*" -ErrorAction SilentlyContinue

          # Comprimir con 7-Zip (compresión balanceada)
          7z a -t7z -mx=7 -mfb=64 -md=16m -ms=on "Production-Processing-Portable.7z" "win-unpacked\"

          $size = (Get-Item "Production-Processing-Portable.7z").Length / 1MB
          Write-Host "[OK] Tamaño: $([math]::Round($size, 2)) MB"
        shell: pwsh

      - name: Upload Portable Compressed (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-compressed
          path: nest-electron/release/Production-Processing-Portable.7z

      # ==========================================
      # ARTIFACTS - MAC
      # ==========================================
      - name: Upload Artifacts (Mac)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: nest-electron/release/*.dmg

      # ==========================================
      # ARTIFACTS - LINUX
      # ==========================================
      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: nest-electron/release/*.AppImage

      # ==========================================
      # RELEASE
      # ==========================================
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: nest-electron/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
