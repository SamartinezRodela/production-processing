name: Build Mac Installer

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            nest-ui-fe/package-lock.json
            nest-ui-be/package-lock.json
            nest-electron/package-lock.json

      - name: Prepare Python Embedded for Mac
        run: |
          echo "🐍 Descargando Python standalone portable para Mac..."
          mkdir -p nest-files-py-embedded-mac
          cd nest-files-py-embedded-mac

          # Descargar Python standalone de indygreg (portable, sin dependencias del sistema)
          PYTHON_VERSION="3.11.9"
          PYTHON_BUILD="20240713"
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/${PYTHON_BUILD}/cpython-${PYTHON_VERSION}+${PYTHON_BUILD}-aarch64-apple-darwin-install_only.tar.gz"

          echo "Descargando Python portable..."
          curl -L -o python.tar.gz "$PYTHON_URL"

          echo "Extrayendo Python..."
          tar -xzf python.tar.gz
          rm python.tar.gz

          # Renombrar carpeta a python-runtime
          mv python python-runtime

          echo "Instalando dependencias..."

          # Bibliotecas básicas
          python-runtime/bin/pip3 install reportlab pypdf Pillow openpyxl requests

          # Bibliotecas científicas y procesamiento
          python-runtime/bin/pip3 install numpy pandas scipy matplotlib

          # Procesamiento de imágenes y PDFs
          python-runtime/bin/pip3 install opencv-python-headless pymupdf tifffile

          echo "✅ Todas las bibliotecas instaladas"

          # Copiar TODOS los scripts Python
          echo "Copiando scripts Python personalizados..."
          if [ -d "../nest-files-py" ]; then
            script_count=$(ls -1 ../nest-files-py/*.py 2>/dev/null | wc -l)
            echo "Archivos encontrados: $script_count"
            
            for file in ../nest-files-py/*.py; do
              if [ -f "$file" ]; then
                cp "$file" .
                echo "   [OK] Copiado: $(basename $file)"
              fi
            done
            
            echo "✅ Todos los scripts copiados exitosamente"
          else
            echo "⚠️ Carpeta nest-files-py no encontrada"
          fi

          # Crear carpeta executables
          mkdir -p executables

          cd ..
          echo "✅ Python standalone portable listo"

      - name: Compile Python Scripts to Bytecode (Mac)
        run: |
          echo "============================================================"
          echo "COMPILANDO SCRIPTS PYTHON A BYTECODE (.pyc) - MAC"
          echo "============================================================"
          echo ""

          # Verificar que el script de compilación existe
          if [ ! -f "compile-python-scripts.py" ]; then
            echo "[ERROR] compile-python-scripts.py no encontrado"
            exit 1
          fi

          # Usar el Python embebido (3.11) para compilar
          echo "Usando Python embebido 3.11 para compilar..."
          PYTHON_EXE="nest-files-py-embedded-mac/python-runtime/bin/python3"

          # Verificar versión de Python
          $PYTHON_EXE --version

          # Ejecutar compilación con Python embebido
          $PYTHON_EXE compile-python-scripts.py nest-files-py-embedded-mac

          if [ $? -ne 0 ]; then
            echo "[ERROR] Error compilando scripts Python"
            exit 1
          fi

          echo ""
          echo "[OK] Scripts Python compilados a .pyc (Mac)"
          echo ""

          # Verificar que los archivos .pyc fueron creados
          echo "Archivos .pyc generados:"
          find nest-files-py-embedded-mac -name "*.pyc" -type f | while read file; do
            echo "   [OK] $(basename $file)"
          done
          echo ""

          # Mostrar hashes generados
          if [ -f "python-hashes.json" ]; then
            echo "Hashes SHA-256 generados:"
            cat python-hashes.json
            echo ""
          fi

          echo "[SECURITY] Verificacion de integridad activa"
          echo ""

      - name: Verify Python embedded exists
        run: |
          if [ -d "nest-files-py-embedded-mac" ]; then
            echo "✅ Python embebido para Mac encontrado"
            ls -la nest-files-py-embedded-mac/
          else
            echo "⚠️ Python embebido para Mac no encontrado"
          fi

      - name: Install Frontend dependencies
        working-directory: nest-ui-fe
        run: npm ci

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Install Backend dependencies
        working-directory: nest-ui-be
        run: npm ci

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Install Electron dependencies
        working-directory: nest-electron
        run: npm install

      - name: Build Electron
        working-directory: nest-electron
        run: npm run build

      - name: Create Mac App with electron-packager
        working-directory: nest-electron
        run: |
          echo "📦 Usando electron-packager (sin firma)..."
          npm run dist:mac-simple
          echo "✅ App creada exitosamente"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"

      - name: Copy resources to Mac App
        run: |
          echo "📁 Copiando recursos..."

          # Encontrar la carpeta de la app
          APP_PATH=$(find nest-electron/release -name "Production Processing-darwin-*" -type d | head -n 1)
          echo "App path: $APP_PATH"

          RESOURCES_DIR="$APP_PATH/Production Processing.app/Contents/Resources"

          # Copiar frontend
          cp -r nest-ui-fe/dist/nest-ui-fe/browser "$RESOURCES_DIR/frontend"
          echo "✅ Frontend copiado"

          # Copiar backend
          mkdir -p "$RESOURCES_DIR/backend"
          cp -r nest-ui-be/dist "$RESOURCES_DIR/backend/"
          cp -r nest-ui-be/node_modules "$RESOURCES_DIR/backend/"
          cp nest-ui-be/package.json "$RESOURCES_DIR/backend/"
          echo "✅ Backend copiado"

          # Copiar carpeta data del backend (base de datos JSON, etc.)
          if [ -d "nest-ui-be/data" ]; then
            cp -r nest-ui-be/data "$RESOURCES_DIR/backend/data"
            echo "✅ Carpeta data del backend copiada"
          else
            echo "⚠️ Carpeta data del backend no encontrada, creando vacía..."
            mkdir -p "$RESOURCES_DIR/backend/data"
          fi

          # Copiar python-hashes.json al backend (verificación de integridad)
          if [ -f "python-hashes.json" ]; then
            cp python-hashes.json "$RESOURCES_DIR/backend/python-hashes.json"
            echo "✅ python-hashes.json copiado al backend"
          else
            echo "⚠️ python-hashes.json no encontrado"
          fi

          # Crear archivo .env para JWT en producción
          echo "Creando .env para backend en producción..."
          JWT_SECRET="${JWT_SECRET:-default-secret-change-in-production-min-32-chars}"
          JWT_EXPIRATION="${JWT_EXPIRATION:-12h}"
          cat > "$RESOURCES_DIR/backend/.env" << EOF
          # JWT Configuration
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRATION=${JWT_EXPIRATION}

          # Application
          NODE_ENV=production
          PORT=3000
          EOF
          echo "✅ .env creado para backend"

          # Copiar Python embebido
          if [ -d "nest-files-py-embedded-mac" ]; then
            cp -r nest-files-py-embedded-mac "$RESOURCES_DIR/python"
            echo "✅ Python embebido copiado"
          else
            echo "⚠️ Python embebido no encontrado"
          fi

          echo "✅ Todos los recursos copiados"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Compress Mac App
        run: |
          echo "📦 Comprimiendo app..."
          APP_PATH=$(find nest-electron/release -name "Production Processing-darwin-*" -type d | head -n 1)
          echo "App encontrada en: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "❌ No se encontró la app"
            exit 1
          fi

          cd nest-electron/release
          FOLDER_NAME=$(basename "$APP_PATH")
          zip -r "Production-Processing-Mac.zip" "$FOLDER_NAME"
          ls -lh Production-Processing-Mac.zip
          echo "✅ App comprimida exitosamente"

      - name: Upload Mac App (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: Production-Processing-Mac-App
          path: nest-electron/release/Production-Processing-Mac.zip
          retention-days: 30
          if-no-files-found: error

      - name: Display Download Instructions
        run: |
          echo "✅ Compilación exitosa!"
          echo "📦 Aplicación Mac creada"
          echo ""
          echo "Para descargar:"
          echo "1. Ve a la pestaña 'Actions' en GitHub"
          echo "2. Selecciona este workflow"
          echo "3. Descarga 'Production-Processing-Mac-App'"
          echo ""
          echo "Para instalar en Mac:"
          echo "1. Descomprime el ZIP"
          echo "2. Arrastra 'Production Processing.app' a Applications"
          echo "3. Click derecho → Abrir (primera vez)"
