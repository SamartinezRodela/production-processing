name: Build Mac Installer

# Modo solo-EXE: Python se usa solo para compilar, no se empaqueta
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            nest-ui-fe/package-lock.json
            nest-ui-be/package-lock.json
            nest-electron/package-lock.json

      - name: Setup Python (temporal para compilar binarios)
        run: |
          echo "Descargando Python standalone (solo para compilar)..."
          mkdir -p python-build-temp
          cd python-build-temp

          PYTHON_VERSION="3.11.9"
          PYTHON_BUILD="20240713"
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/${PYTHON_BUILD}/cpython-${PYTHON_VERSION}+${PYTHON_BUILD}-aarch64-apple-darwin-install_only.tar.gz"

          curl -L -o python.tar.gz "$PYTHON_URL"
          tar -xzf python.tar.gz
          rm python.tar.gz
          mv python python-runtime

          # Instalar PyInstaller + todas las bibliotecas
          echo "Instalando PyInstaller y bibliotecas..."
          python-runtime/bin/pip3 install pyinstaller
          python-runtime/bin/pip3 install reportlab pypdf Pillow openpyxl requests
          python-runtime/bin/pip3 install numpy pandas scipy matplotlib
          python-runtime/bin/pip3 install opencv-python-headless pymupdf tifffile

          echo "[OK] Entorno de compilación listo"
          cd ..

      - name: Compile Python Scripts to Binaries
        run: |
          echo "============================================================"
          echo "COMPILANDO TODOS LOS SCRIPTS A BINARIOS (PyInstaller)"
          echo "============================================================"

          PYTHON_EXE="python-build-temp/python-runtime/bin/python3"
          OUTPUT_DIR="nest-files-py-embedded-mac/executables"
          mkdir -p "$OUTPUT_DIR"

          # ── Grupo A: Scripts stdlib ──
          echo ""
          echo "--- Grupo A: Scripts stdlib ---"

          GRUPO_A=("saludar.py" "guardar_pdf_path.py" "procesar_pdf.py")

          for script in "${GRUPO_A[@]}"; do
            SCRIPT_PATH="nest-files-py/$script"
            if [ -f "$SCRIPT_PATH" ]; then
              echo "Compilando $script ..."
              $PYTHON_EXE -m PyInstaller --onefile --clean --noconfirm \
                --distpath "$OUTPUT_DIR" --workpath "build_temp" --specpath "build_temp" \
                "$SCRIPT_PATH"

              BIN_NAME="${script%.py}"
              if [ -f "$OUTPUT_DIR/$BIN_NAME" ]; then
                echo "   [OK] $BIN_NAME creado"
              else
                echo "   [WARN] $BIN_NAME no se generó"
              fi
            else
              echo "   [SKIP] $script no encontrado"
            fi
          done

          rm -rf build_temp

          # ── Grupo B: Dispatcher ──
          echo ""
          echo "--- Grupo B: Dispatcher (todas las bibliotecas) ---"

          DISPATCHER_PATH="nest-files-py/dispatcher.py"
          if [ -f "$DISPATCHER_PATH" ]; then
            echo "Compilando dispatcher.py (esto puede tardar)..."
            $PYTHON_EXE -m PyInstaller --onefile --clean --noconfirm \
              --distpath "$OUTPUT_DIR" --workpath "build_temp" --specpath "build_temp" \
              --hidden-import "reportlab" --hidden-import "reportlab.pdfgen" \
              --hidden-import "reportlab.lib.pagesizes" --hidden-import "reportlab.lib.units" \
              --hidden-import "pypdf" --hidden-import "fitz" \
              --hidden-import "PIL" --hidden-import "cv2" \
              --hidden-import "numpy" --hidden-import "pandas" \
              --hidden-import "scipy" --hidden-import "scipy.stats" \
              --hidden-import "matplotlib" --hidden-import "matplotlib.pyplot" \
              --hidden-import "openpyxl" --hidden-import "tifffile" \
              --hidden-import "requests" \
              "$DISPATCHER_PATH"

            if [ -f "$OUTPUT_DIR/dispatcher" ]; then
              echo "   [OK] dispatcher creado"
            else
              echo "   [ERROR] dispatcher no se generó"
              exit 1
            fi
          else
            echo "   [ERROR] dispatcher.py no encontrado"
            exit 1
          fi

          rm -rf build_temp

          # ── Resumen ──
          echo ""
          echo "============================================================"
          echo "Binarios generados:"
          ls -lh "$OUTPUT_DIR/"
          echo "============================================================"

      - name: Cleanup Python Build Environment
        run: |
          echo "Limpiando entorno de compilación Python..."
          rm -rf python-build-temp
          echo "[OK] Entorno limpio. Solo binarios en el paquete final."

      - name: Install Frontend dependencies
        working-directory: nest-ui-fe
        run: npm ci

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Install Backend dependencies
        working-directory: nest-ui-be
        run: npm ci

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Install Electron dependencies
        working-directory: nest-electron
        run: npm install

      - name: Build Electron
        working-directory: nest-electron
        run: npm run build

      - name: Create Mac App with electron-packager
        working-directory: nest-electron
        run: |
          echo "Usando electron-packager (sin firma)..."
          npm run dist:mac-simple
          echo "[OK] App creada exitosamente"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"

      - name: Copy resources to Mac App
        run: |
          echo "Copiando recursos..."

          APP_PATH=$(find nest-electron/release -name "Production Processing-darwin-*" -type d | head -n 1)
          echo "App path: $APP_PATH"

          RESOURCES_DIR="$APP_PATH/Production Processing.app/Contents/Resources"

          # Copiar frontend
          cp -r nest-ui-fe/dist/nest-ui-fe/browser "$RESOURCES_DIR/frontend"
          echo "[OK] Frontend copiado"

          # Copiar backend
          mkdir -p "$RESOURCES_DIR/backend"
          cp -r nest-ui-be/dist "$RESOURCES_DIR/backend/"
          cp -r nest-ui-be/node_modules "$RESOURCES_DIR/backend/"
          cp nest-ui-be/package.json "$RESOURCES_DIR/backend/"
          echo "[OK] Backend copiado"

          # Copiar carpeta data del backend
          if [ -d "nest-ui-be/data" ]; then
            cp -r nest-ui-be/data "$RESOURCES_DIR/backend/data"
            echo "[OK] Carpeta data copiada"
          else
            mkdir -p "$RESOURCES_DIR/backend/data"
          fi

          # Crear .env para JWT en producción
          JWT_SECRET="${JWT_SECRET:-default-secret-change-in-production-min-32-chars}"
          JWT_EXPIRATION="${JWT_EXPIRATION:-12h}"
          cat > "$RESOURCES_DIR/backend/.env" << EOF
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRATION=${JWT_EXPIRATION}
          NODE_ENV=production
          PORT=3000
          EOF
          echo "[OK] .env creado"

          # Copiar solo los ejecutables compilados (NO Python embebido)
          mkdir -p "$RESOURCES_DIR/python/executables"
          if [ -d "nest-files-py-embedded-mac/executables" ]; then
            cp -r nest-files-py-embedded-mac/executables/* "$RESOURCES_DIR/python/executables/"
            echo "[OK] Ejecutables copiados (sin Python embebido)"
            ls -lh "$RESOURCES_DIR/python/executables/"
          else
            echo "[ERROR] Directorio de ejecutables no encontrado"
            exit 1
          fi

          echo "[OK] Todos los recursos copiados"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Compress Mac App
        run: |
          echo "Comprimiendo app..."
          APP_PATH=$(find nest-electron/release -name "Production Processing-darwin-*" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "[ERROR] No se encontró la app"
            exit 1
          fi

          cd nest-electron/release
          FOLDER_NAME=$(basename "$APP_PATH")
          zip -r "Production-Processing-Mac.zip" "$FOLDER_NAME"
          ls -lh Production-Processing-Mac.zip
          echo "[OK] App comprimida exitosamente"

      - name: Upload Mac App (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: Production-Processing-Mac-App
          path: nest-electron/release/Production-Processing-Mac.zip
          retention-days: 30
          if-no-files-found: error

      - name: Display Download Instructions
        run: |
          echo "[OK] Compilación exitosa - Modo solo-EXE (sin Python embebido)"
          echo ""
          echo "Para instalar en Mac:"
          echo "1. Descomprime el ZIP"
          echo "2. Arrastra 'Production Processing.app' a Applications"
          echo "3. Click derecho → Abrir (primera vez)"
