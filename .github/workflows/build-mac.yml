name: Build Mac Installer

# Modo solo nest_only_pdf descargado desde release
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            nest-ui-fe/package-lock.json
            nest-ui-be/package-lock.json
            nest-electron/package-lock.json

      # ── COMENTADO: Ya no se compilan binarios con PyInstaller ──
      # Solo se usa nest_only_pdf descargado desde release
      #
      # - name: Setup Python (temporal para compilar binarios)
      # - name: Compile Python Scripts to Binaries
      # - name: Cleanup Python Build Environment

      - name: Download External EXEs from Release
        run: |
          echo "Descargando nest_only_pdf desde release..."
          OUTPUT_DIR="nest-files-py-embedded-mac/executables"
          mkdir -p "$OUTPUT_DIR"

          RELEASE_TAG="v1.0.0-exes"
          ASSET_NAME="nest_only_pdf"
          REPO="${{ github.repository }}"

          RELEASE_JSON=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${RELEASE_TAG}")

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for asset in data.get('assets', []):
              if asset['name'] == '${ASSET_NAME}':
                  print(asset['browser_download_url'])
                  break
          " 2>/dev/null)

          if [ -n "$DOWNLOAD_URL" ]; then
            echo "Descargando desde: $DOWNLOAD_URL"
            curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -o "$OUTPUT_DIR/$ASSET_NAME" "$DOWNLOAD_URL"
            chmod +x "$OUTPUT_DIR/$ASSET_NAME"
            SIZE=$(du -h "$OUTPUT_DIR/$ASSET_NAME" | cut -f1)
            echo "[OK] $ASSET_NAME descargado ($SIZE)"
          else
            echo "[ERROR] $ASSET_NAME no encontrado en release $RELEASE_TAG"
            exit 1
          fi

      - name: Install Frontend dependencies
        working-directory: nest-ui-fe
        run: npm ci

      - name: Build Frontend
        working-directory: nest-ui-fe
        run: npm run build

      - name: Install Backend dependencies
        working-directory: nest-ui-be
        run: npm ci

      - name: Build Backend
        working-directory: nest-ui-be
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Install Electron dependencies
        working-directory: nest-electron
        run: npm install

      - name: Build Electron
        working-directory: nest-electron
        run: npm run build

      - name: Create Mac App with electron-packager
        working-directory: nest-electron
        run: |
          echo "Usando electron-packager (sin firma)..."
          npm run dist:mac-simple
          echo "[OK] App creada exitosamente"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"
          NODE_ENV: "production"

      - name: Copy resources to Mac App
        run: |
          echo "Copiando recursos..."

          APP_PATH=$(find nest-electron/release -name "Production Processing-darwin-*" -type d | head -n 1)
          echo "App path: $APP_PATH"

          RESOURCES_DIR="$APP_PATH/Production Processing.app/Contents/Resources"

          # Copiar frontend
          cp -r nest-ui-fe/dist/nest-ui-fe/browser "$RESOURCES_DIR/frontend"
          echo "[OK] Frontend copiado"

          # Copiar backend
          mkdir -p "$RESOURCES_DIR/backend"
          cp -r nest-ui-be/dist "$RESOURCES_DIR/backend/"
          cp -r nest-ui-be/node_modules "$RESOURCES_DIR/backend/"
          cp nest-ui-be/package.json "$RESOURCES_DIR/backend/"
          echo "[OK] Backend copiado"

          # Copiar carpeta data del backend
          if [ -d "nest-ui-be/data" ]; then
            cp -r nest-ui-be/data "$RESOURCES_DIR/backend/data"
            echo "[OK] Carpeta data copiada"
          else
            mkdir -p "$RESOURCES_DIR/backend/data"
          fi

          # Crear .env para JWT en producción
          JWT_SECRET="${JWT_SECRET:-default-secret-change-in-production-min-32-chars}"
          JWT_EXPIRATION="${JWT_EXPIRATION:-12h}"
          cat > "$RESOURCES_DIR/backend/.env" << EOF
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRATION=${JWT_EXPIRATION}
          NODE_ENV=production
          PORT=3000
          EOF
          echo "[OK] .env creado"

          # Copiar solo los ejecutables (NO Python embebido)
          mkdir -p "$RESOURCES_DIR/python/executables"
          if [ -d "nest-files-py-embedded-mac/executables" ]; then
            cp -r nest-files-py-embedded-mac/executables/* "$RESOURCES_DIR/python/executables/" 2>/dev/null || true
            echo "[OK] Ejecutables copiados"
            ls -lh "$RESOURCES_DIR/python/executables/" 2>/dev/null || echo "  (vacío)"
          else
            echo "[WARN] Directorio de ejecutables Mac no encontrado, continuando..."
          fi

          echo "[OK] Todos los recursos copiados"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "12h"

      - name: Compress Mac App
        run: |
          echo "Comprimiendo app..."
          APP_PATH=$(find nest-electron/release -name "Production Processing-darwin-*" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "[ERROR] No se encontró la app"
            exit 1
          fi

          cd nest-electron/release
          FOLDER_NAME=$(basename "$APP_PATH")
          zip -r "Production-Processing-Mac.zip" "$FOLDER_NAME"
          ls -lh Production-Processing-Mac.zip
          echo "[OK] App comprimida exitosamente"

      - name: Upload Mac App (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: Production-Processing-Mac-App
          path: nest-electron/release/Production-Processing-Mac.zip
          retention-days: 30
          if-no-files-found: error

      - name: Display Download Instructions
        run: |
          echo "[OK] Compilación exitosa"
          echo ""
          echo "Para instalar en Mac:"
          echo "1. Descomprime el ZIP"
          echo "2. Arrastra 'Production Processing.app' a Applications"
          echo "3. Click derecho → Abrir (primera vez)"
