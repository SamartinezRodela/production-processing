<div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-0 overflow-x-hidden">
  <!-- Window Header (estilo macOS/Windows) -->
  <div
    class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between"
  >
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100">Auto Nesting</h1>

      <!-- Badge de estado de procesamiento -->
      @if (isProcessing()) {
        <app-badge
          [label]="'Processing'"
          [variant]="'warning'"
          [icon]="'loader'"
          [dot]="true"
          [size]="'sm'"
        />
      } @else if (selectedFiles().length > 0) {
        <app-badge
          [label]="selectedFiles().length + ' files ready'"
          [variant]="'primary'"
          [size]="'sm'"
        />
      }
    </div>

    <div class="flex items-center gap-2">
      <!-- Dark Mode Toggle -->
      <button
        type="button"
        (click)="themeService.toggleTheme()"
        [title]="themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
        class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors"
      >
        <app-icon
          [name]="themeService.isDarkMode() ? 'sun' : 'moon'"
          [size]="20"
          class="text-gray-700 dark:text-gray-400"
        />
      </button>

      <app-button
        [variant]="'ghost'"
        [icon]="'settings'"
        [iconPosition]="'only'"
        [iconSize]="20"
        (clicked)="goToSettingPage()"
        [customClass]="'p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg'"
      />

      <app-button
        [variant]="'ghost'"
        [icon]="'log-out'"
        [iconPosition]="'only'"
        [iconSize]="20"
        (clicked)="logout()"
        [customClass]="'p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg'"
      />
    </div>
  </div>

  <div class="p-8 max-w-full">
    <!-- Warning Banner si los paths son defaults -->
    @if (showPathWarning()) {
      <div
        class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg p-4 mb-6 flex items-start gap-3"
      >
        <app-icon
          [name]="'alert-triangle'"
          [size]="20"
          class="text-yellow-600 dark:text-yellow-400 shrink-0 mt-0.5"
        />
        <div class="flex-1">
          <h3 class="text-sm font-semibold text-yellow-900 dark:text-yellow-100 mb-1">
            Configure Paths Required
          </h3>
          <p class="text-sm text-yellow-800 dark:text-yellow-200 mb-2">
            Please configure your Base Path and Output Path in Settings before processing files. The
            current paths are set to default values.
          </p>
          <app-button
            [label]="'Go to Settings'"
            [variant]="'white'"
            [size]="'sm'"
            [icon]="'settings'"
            [iconPosition]="'left'"
            [iconSize]="14"
            (clicked)="goToSettingPage()"
            [customClass]="
              'text-xs bg-yellow-100 dark:bg-yellow-800 hover:bg-yellow-200 dark:hover:bg-yellow-700 border-yellow-300 dark:border-yellow-600'
            "
          />
        </div>
        <button
          type="button"
          (click)="dismissPathWarning()"
          class="text-yellow-600 dark:text-yellow-400 hover:text-yellow-800 dark:hover:text-yellow-200"
        >
          <app-icon [name]="'close'" [size]="16" />
        </button>
      </div>
    }

    <!-- Quick Path Configuration (Colapsable) -->
    <app-path-configuration-panel
      [(basePath)]="settingsService.basePath"
      [(outputPath)]="settingsService.outputPath"
      [showWarning]="showPathWarning()"
      [isExpanded]="isPathEditorExpanded()"
      (basePathBlur)="onBasePathBlur()"
      (outputPathBlur)="onOutputPathBlur()"
      (browseBasePath)="browsePath()"
      (browseOutputPath)="browseOutputPath()"
      (expandedChange)="isPathEditorExpanded.set($event)"
    />

    <!-- Filtros y botones de acción -->
    <app-filters-panel
      [facilityOptions]="facilityOptions"
      [selectedFacility]="selectedFacility()"
      [orderOptions]="orderOptions"
      [selectedOrder]="selectedOrder()"
      (facilityChange)="onFacilityChange($event)"
      (orderChange)="onOrderChange($event)"
      (testSaludar)="probarSaludar()"
      (generatePDF)="prorbarGenerarPathPDF()"
      (testGuardarPdf)="probarGuardarPdfRelativo()"
    />

    <!-- Upload Area Component -->
    <app-file-upload-area
      [selectedFiles]="selectedFiles()"
      [isDragging]="isDragging()"
      [isReadingFolder]="isReadingFolder()"
      [folderReadingProgress]="folderReadingProgress()"
      [isProcessing]="isProcessing()"
      [loadedFromFolder]="loadedFromFolder()"
      [validFilesCount]="pdfContainer().validFiles"
      [totalValidFilesSize]="formattedTotalValidFilesSize"
      [maxFileSize]="formattedMaxFileSize"
      [remainingSpace]="formattedRemainingSpace"
      [usagePercentage]="usagePercentage"
      [isOverLimit]="isOverLimit"
      [getFileExtension]="getFileExtension.bind(this)"
      [formatFileSize]="formatFileSize.bind(this)"
      (dragEnter)="onDragEnter($event)"
      (dragOver)="onDragOver($event)"
      (dragLeave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      (fileSelect)="onFileSelect($event)"
      (removeFile)="removeFile($event)"
      (clearAllFiles)="clearAllFiles()"
      (triggerFileInput)="triggerFileInput()"
      (browseFolderRecursive)="browseFolderRecursive()"
      (uploadFiles)="uploadFiles()"
    />

    <!-- Progress Bars -->
    <app-progress-bars
      [isProcessing]="isProcessing()"
      [processingProgress]="progress()"
      [isGeneratingPDF]="isGeneratingPDF()"
      [pdfProgress]="pdfProgress()"
    />

    <!-- Error Log -->
    <app-error-log-panel
      [errorLog]="errorLog()"
      (clearAll)="clearErrorLog()"
      (removeError)="removeError($event)"
      (openOutputFolder)="openOutputFolder()"
    />

    <!-- PDF Metadata Analysis Component -->
    <app-pdf-metadata-table
      [pdfContainer]="pdfContainer()"
      [maxFileSize]="maxFileSize"
      (exportMetadata)="exportMetadata()"
      (clearMetadata)="clearMetadata()"
      (openFileLocation)="openFileLocation($event)"
    />
  </div>
</div>
