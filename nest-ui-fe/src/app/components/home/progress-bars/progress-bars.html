<!-- Processing Progress Bar -->
@if (isProcessing()) {
  <div
    class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6 mt-6"
  >
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm font-medium text-gray-700 dark:text-gray-300"
        >Processing: {{ processingProgress() }}%</span
      >
    </div>
    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 overflow-hidden">
      <div
        class="bg-blue-600 h-2 transition-all duration-300"
        [style.width.%]="processingProgress()"
      ></div>
    </div>
  </div>
}

<!-- PDF Generation Progress Bar -->
@if (isGeneratingPDF()) {
  <div
    class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6 mt-6"
  >
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm font-medium text-gray-700 dark:text-gray-300"
        >Generating PDFs: {{ pdfProgress() }}%</span
      >
    </div>
    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 overflow-hidden">
      <div
        class="bg-green-600 h-2 transition-all duration-300"
        [style.width.%]="pdfProgress()"
      ></div>
    </div>
  </div>
}
