<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg mt-6">
  <div
    class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between"
  >
    <div class="flex items-center gap-2">
      <div class="flex items-start gap-2">
        <app-icon [name]="'logs'" [size]="18" class="text-red-600 dark:text-red-400" />
        <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-100">Error Log</h3>
      </div>

      @if (errorLog().length > 0) {
        <app-badge [label]="errorLog().length.toString()" [variant]="'danger'" [size]="'sm'" />
      }
    </div>
    @if (errorLog().length > 0) {
      <app-button
        [label]="'Clear All'"
        [variant]="'ghost'"
        [size]="'sm'"
        (clicked)="clearAll.emit()"
        [customClass]="
          'text-xs text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 font-medium p-0'
        "
      />
    }
  </div>

  <div class="p-6">
    @if (errorLog().length > 0) {
      <ul class="space-y-2 max-h-80 overflow-y-auto pr-2 error-log-list">
        @for (error of errorLog(); track error.timestamp; let i = $index) {
          <li class="flex items-start gap-3 py-2">
            <app-icon [name]="'alert-triangle'" [size]="16" class="text-red-500 mt-0.5 shrink-0" />
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 dark:text-gray-100">
                Error: {{ error.fileName }} - {{ error.error }}
              </p>
            </div>
            <app-button
              [variant]="'ghost'"
              [icon]="'close'"
              [iconPosition]="'only'"
              [iconSize]="14"
              (clicked)="removeError.emit(i)"
              [customClass]="'p-0 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'"
            />
          </li>
        }
      </ul>

      <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
        <app-button
          [label]="'Open Output Folder'"
          [variant]="'white'"
          [size]="'md'"
          (clicked)="openOutputFolder.emit()"
          [customClass]="'text-sm'"
        />
      </div>
    } @else {
      <div class="text-center py-8 text-sm text-gray-500 dark:text-gray-400">
        No errors to display
      </div>
    }
  </div>
</div>
