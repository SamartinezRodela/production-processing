<button
  [type]="type()"
  [disabled]="disabled()"
  (click)="onClick()"
  [ngClass]="{
    'px-4 py-2 rounded-lg font-medium transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 flex items-center justify-center gap-2': true,
    'bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 !text-white focus:ring-blue-500':
      variant() === 'primary' && !disabled(),
    'bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 focus:ring-gray-400':
      variant() === 'secondary' && !disabled(),
    'bg-red-600 hover:bg-red-700 dark:bg-red-500 dark:hover:bg-red-600 text-white focus:ring-red-500':
      variant() === 'danger' && !disabled(),
    'bg-black hover:bg-gray-500 dark:bg-gray-800 dark:hover:bg-gray-700 text-white focus:ring-gray-500':
      variant() === 'dark' && !disabled(),
    'bg-white hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-black dark:text-gray-100 focus:ring-gray-200 border border-gray-300 dark:border-gray-600':
      variant() === 'white' && !disabled(),
    'bg-transparent hover:bg-gray-50 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 border-0 rounded-none justify-start focus:ring-0 focus:ring-offset-0':
      variant() === 'ghost' && !disabled(),
    'opacity-50 cursor-not-allowed': disabled(),
    'p-2!': icon() && iconPosition() === 'only',
  }"
  [class]="customClass()"
>
  <!-- Icono a la izquierda -->
  @if (icon() && iconPosition() === 'left') {
    <app-icon [name]="icon()" [size]="iconSize()" />
  }
  <!-- Solo icono (sin texto) -->
  @if (icon() && iconPosition() === 'only') {
    <app-icon [name]="icon()" [size]="iconSize()" />
  }
  <!-- Texto del botón (no se muestra si es solo icono) -->
  @if (iconPosition() !== 'only') {
    <ng-content select="[icon]" />
    {{ label() }}
  }

  <!-- Icono a la derecha -->
  @if (icon() && iconPosition() === 'right') {
    <app-icon [name]="icon()" [size]="iconSize()" />
  }
</button>
