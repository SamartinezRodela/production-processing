<div [ngClass]="customClass() || 'w-full'">
  @if (label()) {
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
      {{ label() }}
      @if (required()) {
        <span class="text-red-500">*</span>
      }
    </label>
  }

  <div class="relative">
    <!-- Icono a la izquierda -->
    @if (icon() && iconPosition() === 'left') {
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <app-icon
          [name]="icon()"
          [size]="iconSize()"
          [class]="'text-gray-400 dark:text-gray-500'"
        />
      </div>
    }

    <!-- Input -->
    <input
      [type]="getInputType()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [required]="required()"
      [(ngModel)]="value"
      (blur)="onBlur()"
      [ngClass]="{
        'w-full border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-blue-500 focus:border-transparent disabled:bg-gray-100 dark:disabled:bg-gray-800 disabled:cursor-not-allowed bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100': true,
        'pl-10 pr-3 py-2': icon() && iconPosition() === 'left' && type() !== 'password',
        'pl-3 pr-10 py-2': (icon() && iconPosition() === 'right') || type() === 'password',
        'pl-10 pr-10 py-2': icon() && iconPosition() === 'left' && type() === 'password',
        'px-3 py-2': !icon() && type() !== 'password',
      }"
      [class]="inputClass()"
    />

    <!-- Icono a la derecha -->
    @if (icon() && iconPosition() === 'right' && type() !== 'password') {
      <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
        <app-icon
          [name]="icon()"
          [size]="iconSize()"
          [class]="'text-gray-400 dark:text-gray-500'"
        />
      </div>
    }

    <!-- Botón para mostrar/ocultar contraseña -->
    @if (type() === 'password') {
      <button
        type="button"
        (click)="togglePasswordVisibility()"
        class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer hover:text-gray-600 dark:hover:text-gray-300 transition-colors focus:outline-none"
        [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
      >
        <app-icon
          [name]="showPassword() ? 'eye-off' : 'eye'"
          [size]="20"
          [class]="
            'text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors'
          "
        />
      </button>
    }
  </div>
</div>
