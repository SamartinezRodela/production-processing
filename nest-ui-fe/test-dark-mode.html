<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Mode Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'selector',
      };
    </script>
  </head>
  <body class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
    <div class="container mx-auto p-8">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-4">Dark Mode Test</h1>

        <p class="text-gray-700 dark:text-gray-300 mb-6">
          Click the button below to toggle between light and dark mode.
        </p>

        <button
          onclick="toggleDarkMode()"
          class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors"
        >
          Toggle Dark Mode
        </button>

        <div class="mt-4 p-4 bg-gray-100 dark:bg-gray-700 rounded">
          <p class="text-sm text-gray-600 dark:text-gray-400">
            Current mode: <span id="mode" class="font-bold">light</span>
          </p>
          <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">
            Classes: <span id="classes" class="font-mono text-xs"></span>
          </p>
        </div>
      </div>
    </div>

    <script>
      function toggleDarkMode() {
        const html = document.documentElement;
        const isDark = html.classList.contains('dark');

        if (isDark) {
          html.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        } else {
          html.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        }

        updateDisplay();
      }

      function updateDisplay() {
        const html = document.documentElement;
        const isDark = html.classList.contains('dark');
        document.getElementById('mode').textContent = isDark ? 'dark' : 'light';
        document.getElementById('classes').textContent = html.classList.toString() || 'none';
      }

      // Load theme on startup
      window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        updateDisplay();
      });
    </script>
  </body>
</html>
